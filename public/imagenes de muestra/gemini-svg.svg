<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Fondo oscuro circular -->
  <circle cx="250" cy="250" r="150" fill="#111827" />

  <!-- Línea Azul Giratoria (Interior) -->
  <path d="M 130 250 A 120 120 0 1 1 370 250" 
        fill="none" 
        stroke="#2563EB" 
        stroke-width="12" 
        stroke-linecap="round" />

  <!-- Línea Verde Giratoria (Exterior) -->
  <path d="M 385 250 A 135 135 0 1 1 115 250" 
        fill="none" 
        stroke="#10B981" 
        stroke-width="12" 
        stroke-linecap="round" />

  <!-- Icono de la "F" Central -->
  <g transform="translate(175, 160)">
    <!-- Barra vertical azul (fondo) -->
    <rect x="0" y="0" width="36" height="170" rx="18" fill="#06B6D4" />
    
    <!-- Barra horizontal superior verde -->
    <rect x="18" y="0" width="110" height="36" rx="18" fill="#10B981" />
    
    <!-- Barra horizontal media turquesa -->
    <rect x="18" y="65" width="80" height="36" rx="18" fill="#22D3EE" />
    
    <!-- El punto naranja (Flow) -->
    <circle cx="135" cy="83" r="16" fill="#F59E0B" />
  </g>
</svg>
