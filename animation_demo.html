<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Animación - Sistema PAE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .phone-mockup {
            width: 320px;
            height: 580px;
            background: #1e293b;
            border: 8px solid #334155;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }

        .screen-content {
            padding: 20px;
            text-align: center;
        }

        /* ------------------------------------------------ */
        /* ESTRUCTURA Y COLORES REALES (Cyan #E91E8C)       */
        /* ------------------------------------------------ */
        .cyan-theme { --primary: #E91E8C; --bg-active: #E91E8C; }

        .nav-container {
            position: absolute;
            bottom: 8px;
            left: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(64px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2.5rem;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            z-index: 100;
        }

        .nav-item {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 4px 0;
            position: relative;
            color: #E91E8C; /* cyan-600 */
        }

        .nav-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 10px;
            border-radius: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item.active .nav-inner {
            background: #E91E8C;
            color: white;
            box-shadow: 0 8px 16px rgba(233, 30, 140, 0.4);
        }

        .label {
            font-size: 10px;
            font-weight: 500;
            opacity: 0.8;
        }
        .nav-item.active .label {
            font-weight: 900;
            opacity: 1;
        }

        /* ------------------------------------------------ */
        /* ANIMACIONES                                      */
        /* ------------------------------------------------ */
        
        /* ------------------------------------------------ */
        /* DIFERENCIACIÓN DE PROPUESTAS (MENÚ INFERIOR)     */
        /* ------------------------------------------------ */
        
        /* Prop 1: Estilo Discreto */
        .option-1 .nav-item.active .nav-inner {
            background: rgba(233, 30, 140, 0.1);
            color: #FFB6C1;
            transform: scale(1.05);
        }

        /* Prop 2: Escalado de Enfoque */
        .option-2 .nav-item.active .nav-inner {
            background: #E91E8C;
            color: white;
            transform: scale(1.25) translateY(-2px);
            box-shadow: 0 10px 20px rgba(233, 30, 140, 0.4);
        }

        /* Prop 3: Elevación Flotante */
        .option-3 .nav-item.active .nav-inner {
            background: transparent;
            color: #FFB6C1;
            transform: translateY(-15px);
        }
        .option-3 .nav-item.active svg { filter: drop-shadow(0 0 8px #E91E8C); }

        /* Prop 4: Estética de Pastilla (Pill) */
        .option-4 .nav-item.active .nav-inner {
            background: white;
            color: #0f172a;
            border-radius: 2rem;
            padding: 10px 18px;
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.4);
        }

        /* Prop 5: Fusión Premium (App Real) */
        .option-5 .nav-item.active .nav-inner {
            background: #E91E8C;
            color: white;
            border-radius: 1rem;
            padding: 0.4rem 0.8rem;
            transform: scale(1.1) translateY(-8px) rotate(-2deg);
            box-shadow: 0 5px 15px rgba(233, 30, 140, 0.4);
            transition-delay: 0.15s;
        }
        .option-5 .nav-item.active svg { animation: micro-bounce 0.4s infinite alternate; }
        @keyframes micro-bounce { from { transform: translateY(0); } to { transform: translateY(-3px); } }

        /* Prop 6: Fusión + Zoom/Pop (Option 6) */
        .option-6 .nav-item.active .nav-inner {
            background: #E91E8C;
            color: white;
            border-radius: 1rem;
            padding: 0.4rem 0.8rem;
            animation: push-and-settle 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 5px 15px rgba(233, 30, 140, 0.4);
        }
        @keyframes push-and-settle {
            0% { transform: scale(1) translateY(0); }
            40% { transform: scale(0.8) translateY(2px); }
            70% { transform: scale(1.2) translateY(-10px) rotate(-4deg); }
            100% { transform: scale(1.1) translateY(-8px) rotate(-2deg); }
        }
        .option-6 .nav-item.active svg { animation: micro-bounce 0.4s infinite alternate; animation-delay: 0.45s; }
        
        /* ------------------------------------------------ */
        /* ANIMACIONES DE TARJETAS (NUEVAS)                 */
        /* ------------------------------------------------ */
        @keyframes card-slide-up {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes card-pop {
            0% { opacity: 0; transform: scale(0.6); }
            70% { transform: scale(1.08); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes card-blur-reveal {
            from { opacity: 0; filter: blur(12px); transform: translateY(10px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }
        @keyframes card-glow-pulse {
            0% { opacity: 0; box-shadow: 0 0 0px #E91E8C; }
            50% { opacity: 1; box-shadow: 0 0 30px #E91E8C; }
            100% { opacity: 1; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        }
        @keyframes card-3d-flip {
            from { opacity: 0; transform: perspective(1000px) rotateX(-45deg) translateY(20px); }
            to { opacity: 1; transform: perspective(1000px) rotateX(0) translateY(0); }
        }

        /* MIX: Cascada + Blur */
        @keyframes card-mix-reveal {
            from { 
                opacity: 0; 
                transform: translateY(40px) scale(0.95); 
                filter: blur(15px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
                filter: blur(0); 
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 20px;
            margin-top: 20px;
            background: #0f172a;
            border-radius: 20px;
            border: 1px solid #1e293b;
        }

        .lab-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #334155;
            text-align: left;
            position: relative;
            overflow: hidden;
            opacity: 0; /* Por defecto ocultas para disparar la animación */
        }

        .controls {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .btn {
            background: #334155;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn.active { background: #E91E8C; color: white; }
        .btn-card { background: #1e293b; border: 1px solid #334155; }
        .btn-card:hover { border-color: #E91E8C; }

    </style>
</head>
<body class="cyan-theme">

    <h1 class="text-2xl font-black mb-6 tracking-tighter uppercase text-center">Heladería D'LI - Nav Animations</h1>

    <div class="phone-mockup" id="mockup">
        <div class="screen-content pt-10">
            <h2 id="demo-title" class="text-xl font-bold text-[#E91E8C]">Propuesta 1</h2>
            <p id="demo-desc" class="text-sm text-gray-400 mt-4 px-6">
                Atracción sencilla de polos opuestos con colores reales.
            </p>
            <div class="mt-20 opacity-10">
                <div class="w-full h-32 bg-gray-700 rounded-xl mb-4"></div>
                <div class="w-2/3 h-4 bg-gray-700 rounded-full mx-auto"></div>
            </div>
        </div>

        <div id="nav-wrapper" class="option-1">
            <div class="nav-container">
                <div class="nav-item active" onclick="setActive(this)">
                    <div class="nav-inner">
                        <svg class="icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        <span class="label">Inicio</span>
                    </div>
                </div>
                <div class="nav-item" onclick="setActive(this)">
                    <div class="nav-inner">
                        <svg class="icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        <span class="label">Registrar</span>
                    </div>
                </div>
                <div class="nav-item" onclick="setActive(this)">
                    <div class="nav-inner">
                        <svg class="icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <span class="label">Gestión</span>
                    </div>
                </div>
                <div class="nav-item" onclick="setActive(this)">
                    <div class="nav-inner">
                        <svg class="icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 01-2 2h22a2 2 0 01-2-2v-6a2 2 0 00-2-2h-2a2 2 0 00-2 2v6M9 19h6m-3-3v3m0 0v1m-3-3v1m6-1v1"></path></svg>
                        <span class="label">Reportes</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="btn active" onclick="switchTheme('option-1', 'Propuesta 1', 'Atracción básica de polos opuestos.', this)">Prop 1</div>
        <div class="btn" onclick="switchTheme('option-2', 'Propuesta 2', 'Escalado suave del contenedor activo.', this)">Prop 2</div>
        <div class="btn" onclick="switchTheme('option-3', 'Propuesta 3', 'Elevación simple del icono.', this)">Prop 3</div>
        <div class="btn" onclick="switchTheme('option-4', 'Propuesta 4', 'Fusión dinámica (separar y unir).', this)">Prop 4</div>
        <div class="btn" onclick="switchTheme('option-5', 'Propuesta 5', 'Estilos reales de la app + Fusión dinámica.', this)">Prop 5</div>
        <div class="btn" onclick="switchTheme('option-6', 'Propuesta 6', 'Alejamiento rápido (Push) + Opción 5', this)">Prop 6</div>
    </div>

    <div class="mt-8 pt-8 border-t border-slate-700 w-full max-w-md">
        <h2 class="text-xl font-bold mb-4 text-center tracking-tight">LABORATORIO 2: TARJETAS DE DATOS</h2>
        
        <div id="cards-container" class="stats-grid">
            <!-- Cards will be injected here -->
        </div>

        <div class="controls mt-6">
            <div class="btn btn-card" onclick="playCardAnim('card-slide-up', true)">1. Cascada</div>
            <div class="btn btn-card" onclick="playCardAnim('card-pop', false)">2. Pop</div>
            <div class="btn btn-card" onclick="playCardAnim('card-blur-reveal', true)">3. Foco</div>
            <div class="btn btn-card" onclick="playCardAnim('card-glow-pulse', false)">4. Glow</div>
            <div class="btn btn-card" onclick="playCardAnim('card-3d-flip', true)">5. 3D</div>
            <div class="btn btn-card bg-emerald-600 text-white border-emerald-600" onclick="playCardAnim('card-mix-reveal', true)">6. El MIX (1+3)</div>
        </div>
    </div>

    <script>
        function setActive(el) {
            const items = el.parentElement.querySelectorAll('.nav-item');
            items.forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        function switchTheme(themeClass, title, desc, btn) {
            const wrapper = document.getElementById('nav-wrapper');
            wrapper.className = themeClass;
            document.getElementById('demo-title').innerText = title;
            document.getElementById('demo-desc').innerText = desc;
            
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(b => {
                if (!b.classList.contains('btn-card')) b.classList.remove('active');
            });
            btn.classList.add('active');
        }

        // --- CARDS SYSTEM ---
        const cardsData = [
            { val: 842, label: 'TOTAL ESTUDIANTES', color: 'text-blue-400' },
            { val: 645, label: 'RECIBIERON HOY', color: 'text-emerald-400' },
            { val: 24, label: 'AUSENTES', color: 'text-orange-400' },
            { val: 12, label: 'NO RECIBIERON', color: 'text-red-400' }
        ];

        function animateNumber(obj, start, end, duration, delay) {
            setTimeout(() => {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    obj.innerHTML = Math.floor(progress * (end - start) + start);
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            }, delay * 1000);
        }

        function playCardAnim(animClass, staggered) {
            const container = document.getElementById('cards-container');
            container.innerHTML = ''; // Limpiar
            
            cardsData.forEach((data, i) => {
                const card = document.createElement('div');
                card.className = 'lab-card';
                
                const valId = `val-${i}`;
                card.innerHTML = `
                    <div id="${valId}" class="text-2xl font-black ${data.color} tracking-tighter">0</div>
                    <div class="text-[9px] font-bold text-gray-500 mt-1 uppercase tracking-widest">${data.label}</div>
                `;
                
                const delay = staggered ? (i * 0.1) : 0;
                card.style.animation = `${animClass} 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) ${delay}s forwards`;
                
                container.appendChild(card);

                // Animación del número
                const valEl = card.querySelector(`#${valId}`);
                animateNumber(valEl, 0, data.val, 1000, delay);
            });
        }

        // Init cards
        playCardAnim('card-slide-up', true);
    </script>


</body>
</html>
